<!DOCTYPE html>
<html>
<head>
<title>User Name Input</title>

<style>
body{
background-color:#fff5e6;
font-family:Verdana;
text-align:center;
}

.box{
margin-top:120px;
background-color:white;
padding:25px;
width:35%;
margin-left:auto;
margin-right:auto;
border-radius:12px;
box-shadow:0px 0px 8px gray;
}

input[type=text]{
padding:10px;
width:70%;
font-size:15px;
}

button{
background-color:#ff6600;
color:white;
padding:10px 18px;
border:none;
border-radius:5px;
font-size:15px;
}
</style>

</head>

<body>

<div class="box">

<h2 style="color:#444;">Enter Your Name</h2>

<form action="GreetingDisplayServlet" method="post">

<input type="text"
name="userInputName"
placeholder="Type your name here"
required>

<br><br>

<button type="submit">Show Greeting</button>

</form>

</div>

</body>
</html>
