<!DOCTYPE html>
<html>
<head>
<title>Select Greeting Language</title>

<style>
body{
background-color:#f0f8ff;
font-family:Arial;
text-align:center;
}

.container{
margin-top:100px;
background-color:white;
padding:30px;
border-radius:10px;
width:40%;
margin-left:auto;
margin-right:auto;
box-shadow:0px 0px 10px gray;
}

button{
background-color:#4CAF50;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
font-size:16px;
}

select{
padding:8px;
font-size:15px;
}
</style>

</head>

<body>

<div class="container">

<h2 style="color:#2c3e50;">Choose Your Preferred Language</h2>

<form action="LanguageChoiceServlet" method="post">

<select name="languageOption">
<option value="EN">English</option>
<option value="HI">Hindi</option>
<option value="KN">Kannada</option>
<option value="TA">Tamil</option>
<option value="TE">Telugu</option>
</select>

<br><br>

<button type="submit">Continue</button>

</form>

</div>

</body>
</html>
